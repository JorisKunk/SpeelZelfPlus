<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeelZelf+</title>
    <!-- Tailwind CSS voor de moderne vormgeving -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            darkest: '#1e221f',
                            dark: '#1c352d',
                            primary: '#376153',
                            secondary: '#618b7d',
                            light: '#acc0b7',
                            lighter: '#d2dbd4',

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        textarea::-webkit-scrollbar {
            width: 8px;
        }

        textarea::-webkit-scrollbar-thumb {
            background: #acc0b7;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-brand-bg text-brand-darkest min-h-screen flex flex-col p-4 md:p-8">

    <!-- Header / Branding -->
    <div class="w-full mb-8 text-center mt-4">
        <h1 class="text-5xl font-bold mb-3 tracking-tight">
            <span class="text-brand-primary">Speel</span><span class="text-brand-accent">Zelf</span><span class="text-brand-primary">+</span>
        </h1>
        <p class="text-brand-secondary text-lg font-medium">Dé methode om beweegspellen zelfstandig speelbaar te maken</p>
    </div>

    <!-- Hoofd Layout: 2 kolommen -->
    <div class="max-w-7xl mx-auto w-full flex flex-col lg:flex-row gap-8 items-start">

        <!-- LINKER KOLOM: De Interactieve Beslisboom -->
        <div id="app-card" class="bg-white w-full lg:w-2/3 rounded-3xl shadow-xl p-6 md:p-10 fade-in border-t-4 border-brand-accent relative">
            <!-- Content wordt hier via Javascript ingeladen -->
        </div>

        <!-- RECHTER KOLOM: Het Kladblok -->
        <div class="w-full lg:w-1/3 bg-white rounded-3xl shadow-md border border-brand-lighter p-6 sticky top-8">
            <div class="flex items-center gap-2 mb-4">
                <span class="text-2xl">📝</span>
                <h3 class="font-bold text-brand-primary text-xl">Mijn Kladblok</h3>
            </div>
            <p class="text-sm text-brand-secondary mb-4">Houd hier je keuzes, materialen en ideeën bij. Bewaart automatisch op dit apparaat.</p>
            <textarea id="notesArea" class="w-full h-80 lg:h-96 bg-brand-bg border border-brand-lighter rounded-xl p-4 text-brand-dark focus:outline-none focus:ring-2 focus:ring-brand-accent resize-none transition-all leading-relaxed"></textarea>
        </div>

    </div>

    <script>
        let historyStack = [];

        // Functie om het spel in het notitieblok te updaten vanaf de intro pagina
        function updateNotepadGameName(gameName) {
            const textarea = document.getElementById('notesArea');
            let content = textarea.value;
            // Vervangt de regel die begint met "Spelnaam:" door de nieuwe invoer
            content = content.replace(/Spelnaam: .*/, 'Spelnaam: ' + gameName);
            textarea.value = content;
            localStorage.setItem('speelzelf_notes', content);
        }

        // Functie om kladblok te wissen (bijv. voor een nieuwe collega)
        function clearNotes() {
            const defaultText = "Mijn SpeelZelf+ Project\n\nSpelnaam: \n\nAanpassingen:\n- \n- \n\nBoodschappenlijst:\n- \n- \n";
            document.getElementById('notesArea').value = defaultText;
            localStorage.setItem('speelzelf_notes', defaultText);
        }

        const treeData = {
            // --- NIEUWE INTRODUCTIE PAGINA ---
            intro: {
                type: 'intro',
                //tag: 'Welkom bij de tool',
                title: 'Maak beweegspellen zelfstandig speelbaar voor bewoners',
                description: 'Met de SpeelZelf+ methode loop je in 10 simpele stappen langs de belangrijkste ontwerpprincipes. Het doel? Een bestaand beweegspel zó aanpassen dat bewoners het zelf kunnen starten, spelen en resetten, zonder constante begeleiding.',
                customHtml: `
                        <div class="bg-brand-bg p-6 rounded-xl mb-8 border border-brand-lighter shadow-inner">
                            <label class="block font-bold text-brand-darkest mb-2 text-lg">Welk beweegspel ga je vandaag aanpassen?</label>
                            <p class="text-sm text-brand-secondary mb-4">Pak het spel er fysiek bij en typ de naam hieronder in. Het verschijnt direct in je Kladblok!</p>
                            <input type="text" placeholder="Bijv. Sjoelbak, Ringwerpen, Kegelen..." class="w-full p-4 rounded-lg border border-brand-light focus:outline-none focus:ring-2 focus:ring-brand-accent text-lg" oninput="updateNotepadGameName(this.value)">
                        </div>
                    `,
                options: [
                    { label: 'Start de 10-stappen APK', next: 'start' }
                ]
            },

            // STAP 1
            start: {
                type: 'question',
                tag: 'Stap 1/10: Herkenbaarheid & Eenvoud',
                title: 'Hebben de bewoners dit spel (of een variant hiervan) eerder gespeeld en begrijpen ze de regels?',
                description: 'Herkenbaarheid vergroot de bereidheid om deel te nemen. Als een concept te abstract of onbekend is, blijven bewoners er weg.',
                options: [
                    { label: 'Ja, het is bekend en logisch', next: 'q2' },
                    { label: 'Nee, het is nieuw of ingewikkeld', next: 'tip1' }

            tip1: {
                type: 'tip',
                tag: 'Principe 1: Herkenbaarheid',
                title: 'Kies een bekende basis of maak een visuele handleiding',
                description: 'Kies een spelconcept dat aansluit bij hun verleden. Hebben ze een opfriscursus nodig? Maak dan een simpel, groot instructieblad met stappen en illustraties.',

                exampleText: 'Japans Biljart+ is gebaseerd op een spel dat bij veel zorgcentra gespeeld wordt. Doordat bewoners het vaker hebben gespeeld snappen ze intuïtief wat ze moeten doen.',

            // STAP 2
            q2: {
                type: 'question',
                tag: 'Stap 2/10: Zelfstandig Opstarten',
                title: 'Ligt het spel voor het grijpen op een logische plek in de ruimte?',

                options: [

                    { label: 'Nee, het staat in een dichte kast of is te zwaar', next: 'tip2' }

            },
            tip2: {
                type: 'tip',
                tag: 'Principe 2: Zelfstandig Opstartbaar',
                title: 'Geef het spel een vaste, zichtbare plek',
                description: 'Maak een vaste plek voor het spel in de gemeenschappelijke ruimte. Zorg dat het goed toegankelijk is, maar niet in de weg staat van het dagelijkse ritme.',

                materials: 'Een verhoging of een kleine, stabiele bijzettafel (bijv. van Ikea of Kringloop).',
                exampleText: 'Japans Biljart+ heeft zijn eigen vaste plek gekregen in de gezamenlijke woonkamer, in plaats van in een afgesloten spellenkast. Het spel kan direct gespeeld worden.',
                options: [{ label: 'Check! Door naar stap 3', next: 'q3' }]
            },

            // STAP 3
            q3: {
                type: 'question',
                tag: 'Stap 3/10: Zelf Resetten',
                title: 'Kunnen de bewoners het spel zélf makkelijk en veilig resetten na een beurt?',
                description: 'Bij veel spellen zorgt een begeleider dat spelelementen zoals ballen of ringen worden verzameld en teruggegeven.',
                options: [
                    { label: 'Ja, ze kunnen zelf een nieuwe beurt starten', next: 'q4' },
                    { label: 'Nee, ze kunnen er niet bij of moeten ver reiken', next: 'tip3' }
                ]
            },
            tip3: {
                type: 'tip',
                tag: 'Principe 3: Fysieke Toegankelijkheid',
                title: 'Ontwerp een hulpmiddel om te resetten',
                description: 'Zorg dat bewoners binnen hun fysieke mogelijkheden het spel zelfstandig en makkelijk kunnen resetten, zonder dat de actie stilvalt en zonder dat ze moeten opstaan.',
                criteria: 'Het voldoet als: Een rolstoelgebruiker het hele spel (inclusief opruimen) kan spelen zonder los te komen van de rugleuning.',
                materials: 'Maak gebruik van PVC buizen, karton, hout en lichte materialen (bouwmarkt).',
                exampleText: 'Bij Japans Biljart+ is een ballenhark gemaakt van een lichte elektrabuis en een fietshandvat. Hiermee kunnen bewoners gemakkelijk en veilig de ballen vanuit hun stoel naar zich toe halen.',

            q4: {

                options: [

            tip4: {
                type: 'tip',

                title: 'Gebruik kleurcodering of visuele hulpmiddelen',
                description: 'Maak het tellen makkelijker door lagere getallen te gebruiken of kleuren te koppelen aan scores. Zorg voor hoog contrast zodat het ook met verslechterd zicht te lezen is.',
                criteria: 'Het voldoet als: Een bewoner volledig zelfstandig zijn score kan berekenen na een beurt.',
                materials: 'Felgekleurde markeer-tape, grote matte cijferstickers of verf.',
                exampleText: 'Omdat de cijfers op de bak slecht leesbaar waren, zijn er gekleurde cirkels rond de gaten van Japans Biljart+ geverfd. Een groot, visueel spiekbriefje koppelt nu de kleuren aan simpele punten.',

                exampleImage2: 'kleurenschema.png',
                options: [{ label: 'Check! Door naar stap 5', next: 'q5' }]
            },

            // STAP 5
            q5: {
                type: 'question',
                tag: 'Stap 5/10: Succes & Moeilijkheid',
                title: 'Lukt het bijna altijd om punten te scoren, voor ieder niveau?',
                description: 'Frequente succeservaringen vergroten het zelfvertrouwen. Te veel falen frustreert en demotiveert direct.',
                options: [
                    { label: 'Ja, het geeft veel succeservaringen', next: 'q6' },
                    { label: 'Nee, het is vaak te moeilijk voor sommigen', next: 'tip5' }
                ]
            },
            tip5: {
                type: 'tip',
                tag: 'Principe 5: Aanpasbare Moeilijkheid',
                title: 'Pas de afstand of de regels aan',
                description: 'Maak de moeilijkheid aanpasbaar zónder het spel compleet om te bouwen. Verkort de werpafstand met een markering op de vloer, of maak de doelvlakken groter.',
                criteria: 'Het voldoet als: Iedere deelnemer in zijn beurt minimaal 1 succeservaring (een hit of punt) beleeft.',
                materials: 'Schilderstape om werplijnen op verschillende afstanden op de vloer te plakken.',
                exampleText: 'Bij Japans Biljart+ bleek de bak zelf precies de juiste balans te bieden tussen uitdaging en haalbaarheid. Wel is de regel ingesteld dat rolstoelgebruikers dichterbij aan de zijkant mogen staan.',
                options: [{ label: 'Check! Door naar stap 6', next: 'q6' }]
            },

            // STAP 6
            q6: {
                type: 'question',
                tag: 'Stap 6/10: Competitie',
                title: 'Kunnen bewoners op een leuke manier met elkaar de strijd aan gaan en punten bijhouden?',
                description: 'Positieve competitie motiveert bewoners om te blijven spelen omdat ze hun eigen score willen verbeteren en die van medebewoners verslaan.',
                options: [
                    { label: 'Ja, ze kunnen hun punten bijhouden', next: 'q7' },
                    { label: 'Nee, er is geen manier om scores bij te houden', next: 'tip6' }

            tip6: {
                type: 'tip',
                tag: 'Principe 6: Positieve Competitie',
                title: 'Introduceer een laagdrempelig Leaderboard',
                description: 'Geef bewoners de mogelijkheid om zelf hun scores bij te houden. Koppel hier eventueel een periodieke titel (Weekwinnaar) aan vast.',
                criteria: 'Het voldoet als: Bewoners uit zichzelf gaan kijken of hun score al verslagen is.',
                materials: 'Klein Whiteboard met standaard en whiteboard markers.',
                exampleText: 'Er is een whiteboard met een houten standaard gemaakt dat naast de bak staat. Hierop is een Leaderboard gemaakt. Bewoners schrijven hier hun eigen naam en score op.',
                exampleImage: 'leaderboard.png',
                options: [{ label: 'Check! Door naar stap 7', next: 'q7' }]
            },

            // STAP 7
            q7: {
                type: 'question',
                tag: 'Stap 7/10: Spelfeedback',
                title: 'Is het voor de bewoner duidelijk als ze iets goed doen?',
                description: 'Spelfeedback (licht, geluid, beweging) is een belangrijk onderdeel voor spelplezier. Zonder feedback voelt een spel dood aan.',
                options: [
                    { label: 'Ja, het spel "reageert" goed', next: 'q8' },
                    { label: 'Nee, je hoort of ziet niet echt dat je scoort', next: 'tip7' }
                ]
            },
            tip7: {
                type: 'tip',
                tag: 'Principe 7: Real-time Feedback',
                title: 'Voeg licht, geluid of tactiele elementen toe',
                description: 'Feedback is geen decoratie, het bestuurt de ervaring. Gebruik bellen, knallende kleuren of elektronica om een succesvolle actie te markeren en te vieren.',

                materials: 'Belletjes, grote gekleurde vlakken of een klein speakertje.',
                exampleText: 'Er is een simpele sensor in de bak gemaakt die ballen registreert. Via LED-strips en een speakertje krijgt de speler direct positieve licht- en geluidssignalen als beloning voor een goede worp.',

                options: [{ label: 'Check! Door naar stap 8', next: 'q8' }]
            },

            q8: {
                type: 'question',
                tag: 'Stap 8/10: Sociale Interactie',
                title: 'Zorgt het spel automatisch voor interactie, zoals samenspel of toeschouwers?',
                description: 'Samen spelen is een van de grootste drijfveren om mee te doen met een spel.',
                options: [
                    { label: 'Ja, mensen spelen het vaak samen', next: 'q9' },
                    { label: 'Nee, het wordt vooral alleen gespeeld', next: 'tip8' }
                ]
            },
            tip8: {
                type: 'tip',
                tag: 'Principe 8: Stimuleer Interactie',
                title: 'Ontwerp een Team- of Duo-modus',
                description: 'Verander de opzet zodat bewoners elkaars hulp nodig hebben. Introduceer een duomodus waarbij de score gedeeld wordt, of richt de ruimte zo in dat toeschouwers makkelijk kunnen aanschuiven.',

                materials: 'Voldoende stoelen rondom het spel, speciale Duo-vakken op je whiteboard-leaderboard.',
                exampleText: 'Japans Biljart is van nature een magneet voor toeschouwers. Om dit te versterken, is op het Leaderboard een apart "Duo-vak" gemaakt. Zo stimuleren we bewoners om gezamenlijk een hoge score neer te zetten.',
                exampleImage: 'leaderboard.png',
                options: [{ label: 'Check! Door naar stap 9', next: 'q9' }]
            },

            // STAP 9
            q9: {
                type: 'question',
                tag: 'Stap 9/10: Uitnodigingskracht',
                title: 'Trekt het spel (terwijl het stilstaat) actief de aandacht van mensen in de kamer?',
                description: 'Bewoners zijn gewend dat activiteiten worden aangekondigd. Als het spel stil in de hoek staat, vergeten ze dat ze het mogen spelen.',
                options: [
                    { label: 'Ja, het valt goed op', next: 'q10' },
                    { label: 'Nee, het gaat op in het meubilair', next: 'tip9' }
                ]
            },
            tip9: {
                type: 'tip',
                tag: 'Principe 9: Triggers en Lokken',
                title: 'Creëer een "Attract Mode"',
                description: 'Voeg subtiele elementen toe die de aandacht trekken. Dit hoeft geen kermis te zijn; een simpel bord met "Kom spelen", een opvallende kleur of een zacht lampje herinnert ze eraan dat het er staat.',

                materials: 'Kartonbord met "Kom spelen!", placemats in contrastkleur of een zacht pulserend lampje.',
                exampleText: 'Als er langer dan 30 seconden niet met Japans Biljart+ gespeeld wordt, gaat de "Attract Mode" aan. De LED-strips vertonen dan een subtiele, golvende lichtanimatie die zachtjes de aandacht van de ruimte trekt.',
                exampleImage: 'ledstrips.png',
                options: [{ label: 'Check! Door naar de laatste stap', next: 'q10' }]
            },

            // STAP 10
            q10: {
                type: 'question',
                tag: 'Stap 10/10: Maximale Reikafstand',
                title: 'Kunnen bewoners álles doen zonder buiten hun maximale reikafstand te komen?',
                description: 'Ver reiken of bukken tijdens spelacties, het noteren van de score, of het pakken van onderdelen kan leiden tot onveilige situaties (valgevaar).',
                options: [
                    { label: 'Ja, alles kan bereikt worden door alleen de arm te strekken', next: 'success' },
                    { label: 'Nee, ze moeten naar voren leunen in de stoel of bukken', next: 'tip10' }
                ]
            },
            tip10: {
                type: 'tip',
                tag: 'Principe 10: Breng het naar de speler',
                title: 'Zittend Ontwerp op de juiste hoogte',
                description: 'Plaats vloerspellen (zoals ringwerpen) op een verhoogde, rolstoeltoegankelijke tafel. Hang mikspellen op ooghoogte in zitpositie. Zorg dat ook het scorebord direct naast de speler staat.',
                criteria: 'Het voldoet als: Een speler de hele speelbeurt lang met de rug comfortabel tegen de stoelleuning kan blijven zitten.',
                materials: 'Rolstoeltoegankelijke tafel (zonder dikke rand eronder), of de spellen aan de muur bevestigen op zithoogte.',

            // --- NIEUWE EIND PAGINA (Met Samenvatting) ---
            success: {
                type: 'success',
                tag: 'Gefeliciteerd!',
                title: 'Je hebt een SpeelZelf+ spel ontworpen!',
                description: 'Je hebt alle 10 de principes doorlopen. Hieronder vind je de samenvatting van jouw aantekeningen. Je kunt dit nu in de praktijk gaan brengen!',
                showSummary: true, // Dit vertelt de code om de samenvatting te genereren
                options: [
                    { label: 'Nieuw project starten (Wis Kladblok)', next: 'intro', action: 'clearNotes' },
                    { label: 'Bewaar notities & ga naar start', next: 'intro', style: 'outline' }
                ]
            }
        };

        const appCard = document.getElementById('app-card');

        function renderNode(nodeId, isBack = false) {
            const node = treeData[nodeId];

            if (!isBack && nodeId !== 'intro') {
                const currentTag = document.querySelector('[data-current-node]')?.getAttribute('data-current-node');
                if (currentTag) historyStack.push(currentTag);
            } else if (nodeId === 'intro') {
                historyStack = [];
            }

            appCard.innerHTML = '';
            appCard.classList.remove('fade-in');
            void appCard.offsetWidth;
            appCard.classList.add('fade-in');
            appCard.setAttribute('data-current-node', nodeId);

            let html = '';

            // Terug knop (Niet op de intro pagina of succes pagina)
            if (historyStack.length > 0 && nodeId !== 'success') {
                html += `
                        <button onclick="goBack()" class="absolute top-6 left-6 text-brand-secondary hover:text-brand-accent flex items-center gap-1 font-semibold transition-colors">
                            <span>←</span> Terug
                        </button>
                        <div class="mt-8"></div>`;
            }

            if (node.tag) {
                html += `<span class="inline-block bg-brand-lighter text-brand-primary font-bold px-4 py-1.5 rounded-full text-xs mb-5 uppercase tracking-widest">${node.tag}</span>`;
            }

            html += `<h2 class="text-3xl md:text-4xl font-bold text-brand-darkest mb-5 leading-tight">${node.title}</h2>`;

            if (node.description) {
                html += `<p class="text-brand-dark text-lg mb-6 leading-relaxed">${node.description}</p>`;
            }

            // Aangepaste HTML (Voor de Intro Input)
            if (node.customHtml) {
                html += node.customHtml;
            }

            // Kaders voor Tips
            if (node.type === 'tip') {
                html += `<div class="flex flex-col md:flex-row gap-4 mb-6">`;
                if (node.criteria) {
                    html += `
                            <div class="flex-1 bg-green-50 border border-green-200 p-4 rounded-xl">
                                <span class="block text-green-700 font-bold text-sm uppercase mb-1">🎯 Wanneer voldoet het?</span>
                                <p class="text-green-900 text-sm">${node.criteria}</p>
                            </div>`;
                }
                if (node.materials) {
                    html += `
                            <div class="flex-1 bg-yellow-50 border border-yellow-200 p-4 rounded-xl">
                                <span class="block text-yellow-700 font-bold text-sm uppercase mb-1">🛒 Boodschappen tip</span>
                                <p class="text-yellow-900 text-sm">${node.materials}</p>
                            </div>`;
                }
                html += `</div>`;
            }

            // Voorbeeld Kader
            if (node.exampleText) {
                let imagesHtml = '';
                if (node.exampleImage && node.exampleImage2) {
                    imagesHtml = `
                                <div class="flex flex-col sm:flex-row gap-4 w-full justify-center">
                                    <img src="${node.exampleImage}" alt="Voorbeeld 1" class="w-full sm:w-1/2 h-auto max-h-[350px] object-contain rounded border border-brand-lighter shadow-sm">
                                    <img src="${node.exampleImage2}" alt="Voorbeeld 2" class="w-full sm:w-1/2 h-auto max-h-[350px] object-contain rounded border border-brand-lighter shadow-sm">
                                </div>`;
                } else if (node.exampleImage && node.exampleImage !== '') {
                    imagesHtml = `<img src="${node.exampleImage}" alt="Voorbeeld" class="w-full h-auto max-h-[400px] object-contain rounded border border-brand-lighter shadow-sm">`;
                }

                html += `
                        <div class="bg-[#f0ece1] p-6 rounded-2xl mb-8 border-l-4 border-brand-accent shadow-sm">
                            <h3 class="font-bold text-brand-primary text-xl mb-3 flex items-center gap-2">
                                <span>💡</span> Voorbeeld uit de praktijk: Japans Biljart+
                            </h3>
                            <p class="text-brand-darkest mb-4 leading-relaxed">${node.exampleText}</p>
                            ${imagesHtml ? `<div class="bg-white p-2 rounded-xl">${imagesHtml}</div>` : ''}
                        </div>`;
            }

            // --- DE SAMENVATTING (Alleen op success pagina) ---
            if (node.showSummary) {
                const currentNotes = document.getElementById('notesArea').value;
                html += `
                        <div class="bg-brand-lighter p-6 rounded-xl mb-8 border border-brand-light">
                            <h3 class="font-bold text-brand-darkest text-lg mb-2 flex items-center gap-2"><span>📋</span> Jouw SpeelZelf+ Ontwerp</h3>
                            <pre class="whitespace-pre-wrap font-sans text-brand-dark leading-relaxed">${currentNotes}</pre>
                        </div>`;
            }

            // Knoppen
            html += `<div class="flex flex-col sm:flex-row gap-4 mt-8">`;
            node.options.forEach(opt => {
                const isOutline = opt.style === 'outline';
                const btnClass = isOutline
                    ? 'border-2 border-brand-primary text-brand-primary hover:bg-brand-lighter'
                    : 'bg-brand-accent text-white hover:bg-[#c26547] shadow-lg shadow-brand-accent/20';

                // Als de knop het Kladblok moet wissen, voeg een bevestiging toe
                let onclickCode = `renderNode('${opt.next}')`;
                if (opt.action === 'clearNotes') {
                    onclickCode = `if(confirm('Weet je zeker dat je het huidige kladblok wilt wissen?')) { clearNotes(); renderNode('${opt.next}'); }`;
                }

                html += `<button onclick="${onclickCode}" class="px-6 py-4 rounded-xl font-bold transition-all duration-200 flex-1 text-center text-lg ${btnClass}">
                                ${opt.label}
                             </button>`;
            });
            html += `</div>`;

            appCard.innerHTML = html;
        }

        function goBack() {
            if (historyStack.length > 0) {
                const previousNode = historyStack.pop();
                renderNode(previousNode, true);
            }
        }

        const notesArea = document.getElementById('notesArea');
        if (localStorage.getItem('speelzelf_notes')) {
            notesArea.value = localStorage.getItem('speelzelf_notes');
        } else {
            notesArea.value = "Mijn SpeelZelf+ Project\n\nSpelnaam: \n\nAanpassingen:\n- \n- \n\nBoodschappenlijst:\n- \n- \n";
        }

        notesArea.addEventListener('input', function () {
            localStorage.setItem('speelzelf_notes', this.value);
        });

        // We starten nu netjes op de 'intro' pagina in plaats van 'start'!
        renderNode('intro');
    </script>
</body>
</html>
